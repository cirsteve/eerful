name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: python (lint + type + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check src tests

      - name: Type check (mypy --strict)
        run: uv run mypy src tests

      - name: Test (pytest)
        run: uv run pytest -q

  bridge:
    name: zg-bridge (typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/zg-bridge
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: services/zg-bridge/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

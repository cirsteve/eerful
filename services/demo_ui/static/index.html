<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>eerful — multi-agent demo</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header>
    <div class="title">eerful · multi-agent trading demo</div>
    <div class="run">
      <span id="run-id" class="run-id">no run yet</span>
      <span id="tool-response" class="tool-response"></span>
      <button id="clear-btn" type="button" title="reset SPA + truncate event log">clear</button>
    </div>
  </header>

  <main>
    <section class="agent" id="explorer-card">
      <div class="agent-head">
        <span class="agent-name">Explorer</span>
        <span class="agent-host">@otto · via gil</span>
      </div>
      <div class="agent-events" id="explorer-events"></div>
      <div class="agent-status" id="explorer-status">idle</div>
    </section>

    <section class="wire" id="wire">
      <svg viewBox="0 0 100 360" preserveAspectRatio="none">
        <line x1="50" y1="20" x2="50" y2="340" class="wire-line"/>
        <circle id="wire-dot" r="7" cx="50" cy="20" class="wire-dot hidden"/>
      </svg>
      <div class="wire-label" id="wire-label"></div>
    </section>

    <section class="agent" id="refiner-card">
      <div class="agent-head">
        <span class="agent-name">Refiner</span>
        <span class="agent-host">@louie</span>
      </div>
      <div class="agent-events" id="refiner-events"></div>
      <div class="agent-status" id="refiner-status">idle</div>
    </section>

    <section class="agent gate-col" id="gate-card">
      <div class="agent-head">
        <span class="agent-name">Gate</span>
        <span class="agent-host">@otto · executor</span>
      </div>
      <div class="verdict-stack" id="verdict-stack"></div>
      <div class="agent-status" id="gate-status">awaiting receipts</div>
    </section>
  </main>

  <footer>
    <div class="mandate" id="mandate-badge">mandate: 5% drawdown · 2x leverage · BTC/ETH/SOL</div>
    <div class="meta">
      <span>policy: <code>low_consequence</code></span>
      <span>threshold: <code id="threshold">—</code></span>
    </div>
  </footer>

  <script src="/static/app.js"></script>
</body>
</html>
